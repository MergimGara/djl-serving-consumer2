name: Build, Push & Deploy (Multi-Container)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Consumer image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/djl-serving-consumer2:latest

      - name: Deploy multicontainer app to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: mdm-serving-garamer1
          publish-profile: ${{ secrets.AZURE_MULTICONTAINER_PUBLISH_PROFILE }}
          configuration-file: docker-compose-azure.yml
